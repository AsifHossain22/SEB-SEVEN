<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SiteTitle -->
  <title>Task Flow — Task Management Application</title>

  <!-- Google Fonts: Plus Jakarta Sans + Syne -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Syne:wght@700;800&display=swap"
    rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="./index.css">
</head>

<body>
  <!-- Navbar -->
  <nav id="navbar">
    <div style="display:flex;align-items:center;gap:10px;flex-shrink:0">
      <a class="nav-logo" href="">
        <div class="nav-logo-icon">⚡</div>
        <span>TaskFlow</span>
      </a>
      <div style="width:1px;height:20px;background:var(--border)"></div>
      <input id="boardTitleInput" class="nav-board-title" value="Create Your Tasks" />
    </div>

    <div class="nav-right">
      <!-- Notification -->
      <div class="rel">
        <button class="icon-btn" id="notifBtn" title="Notifications">🔔
          <span class="notif-dot"></span>
        </button>
        <div id="notifPanel" class="dropdown hidden" style="right:0;top:38px;width:270px">
          <div
            style="padding:10px 14px 8px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
            <span style="font-weight:700;font-size:.85rem">Notifications</span>
            <button class="btn-ghost" onclick="closeNotif()" style="font-size:12px">✕</button>
          </div>
          <div id="notifList"></div>
        </div>
      </div>
      <button class="icon-btn" title="Settings">⚙️</button>
      <button class="avatar" title="Profile">TF</button>
    </div>
  </nav>

  <!-- Board -->
  <div id="board-wrap">
    <div id="board">
      <!-- AddListColumn -->
      <div class="add-list-col" id="addListCol">
        <button class="add-list-btn" id="showAddListBtn">➕ Add another list</button>
        <div class="add-list-form hidden" id="addListForm">
          <input id="newListInput" placeholder="Enter list title…" maxlength="60" />
          <div class="form-btns">
            <button class="btn-primary" onclick="submitAddList()">Add list</button>
            <button class="btn-ghost" onclick="hideAddList()">✕</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- CardModal -->
  <div class="modal-overlay hidden" id="cardModal" onclick="handleModalOverlayClick(event)">
    <div class="modal" id="modalBox">
      <!-- ModalCover -->
      <div class="modal-cover hidden" id="modalCover"></div>

      <!-- ModalHeader -->
      <div class="modal-header">
        <span class="modal-title-icon">📋</span>
        <div class="modal-title-area">
          <textarea id="modalTitle" class="modal-title-input" rows="1" spellcheck="false"></textarea>
          <span class="modal-list-tag" id="modalListTag">in list …</span>
        </div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>

      <!-- ModalBody -->
      <div class="modal-body">

        <!-- ModalMain -->
        <div class="modal-main">

          <!-- LabelSection -->
          <div class="modal-section" id="modalLabelsSection">
            <div class="section-header"><span>🏷️</span> Labels</div>
            <div class="labels-grid" id="modalLabelsDisplay"></div>
          </div>

          <!-- Description -->
          <div class="modal-section">
            <div class="section-header"><span>📝</span> Description</div>
            <div id="descView" class="desc-view" onclick="startEditDesc()">
              <span id="descText" style="color:var(--text3);font-style:italic">Add a more detailed description…</span>
            </div>
            <textarea id="descEdit" class="desc-edit hidden" placeholder="Add a more detailed description…"
              oninput="autoResize(this)"></textarea>
            <div class="form-btns hidden" id="descBtns" style="margin-top:6px">
              <button class="btn-primary" onclick="saveDesc()">Save</button>
              <button class="btn-ghost" onclick="cancelDesc()">✕</button>
            </div>
          </div>

          <!-- Checklist -->
          <div class="modal-section">
            <!-- Header -->
            <div class="section-header">
              <span>☑️</span> Checklist
              <span id="checkPct" class="check-pct badge-gray" style="display:none"></span>
            </div>

            <!-- ProgressBar -->
            <div class="check-progress-bar" id="checkProgressBar" style="display:none">
              <div class="check-progress-fill" id="checkProgressFill"></div>
            </div>

            <div id="checklistItems"></div>
            <!-- Add item -->
            <div id="addCheckArea">
              <button
                style="display:flex;align-items:center;gap:6px;padding:5px 8px;background:transparent;border:none;color:var(--text3);font-family:inherit;font-size:.8rem;cursor:pointer;border-radius:7px;transition:.12s"
                onmouseover="this.style.background='var(--bg3)';this.style.color='var(--text1)'"
                onmouseout="this.style.background='transparent';this.style.color='var(--text3)'"
                onclick="showAddCheckInput()">➕ Add an item</button>
              <div id="addCheckForm" class="hidden" style="margin-top:6px">
                <input id="checkItemInput"
                  style="width:100%;background:var(--bg3);border:1.5px solid var(--brand);border-radius:8px;color:var(--text1);font-family:inherit;font-size:.82rem;padding:7px 10px;outline:none;margin-bottom:6px"
                  placeholder="Add an item…" />
                <div class="form-btns">
                  <button class="btn-primary" onclick="submitCheckItem()">Add</button>
                  <button class="btn-ghost" onclick="hideAddCheckInput()">✕</button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Sidebar -->
        <div class="modal-sidebar">
          <div class="sidebar-label">Add to card</div>

          <!-- LabelsPicker -->
          <div class="rel">
            <button class="sidebar-btn" onclick="toggleLabelPicker()"><span>🏷️</span> Labels</button>
            <div id="labelPickerPanel" class="dropdown hidden" style="right:0;top:34px;width:210px;padding:10px">
              <div
                style="font-size:.72rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">
                Labels
              </div>
              <div id="labelPickerList"></div>
            </div>
          </div>

          <!-- DueDate -->
          <div class="rel">
            <button class="sidebar-btn" onclick="document.getElementById('dueDatePicker').showPicker()">
              <span>📅</span> Due date
            </button>
            <input type="date" id="dueDatePicker" class="hidden-date" onchange="setDueDate(this.value)" />
            <div id="dueDateDisplay" class="due-date-display hidden">
              <span id="dueDateText" class="card-badge"></span>
              <button onclick="clearDueDate()"
                style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px">✕</button>
            </div>
          </div>

          <!-- Cover -->
          <div class="rel">
            <button class="sidebar-btn" onclick="toggleCoverPicker()"><span>🎨</span> Cover</button>
            <div id="coverPickerPanel" class="dropdown hidden" style="right:0;top:34px;width:200px;padding:10px">
              <div
                style="font-size:.72rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">
                Cover color</div>
              <div class="cover-grid" id="coverGrid"></div>
              <button id="removeCoverBtn" class="sidebar-btn danger" style="margin-top:8px;width:100%;display:none"
                onclick="removeCover()">✕ Remove cover</button>
            </div>
          </div>

          <div style="height:1px;background:var(--border);margin:10px 0"></div>
          <div class="sidebar-label">Actions</div>

          <!-- DeleteCard -->
          <button class="sidebar-btn danger" onclick="deleteCurrentCard()">🗑️ Delete card</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="./index.js"></script>

  <!--! SecurityCode -->
  <script>
    // No Security :(
  </script>
</body>

</html>
